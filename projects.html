    <!-- Custom Scripts: Filtering & Modal -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // Navigation Link Transition Handler
            const navLinks = document.querySelectorAll('.nav-link');
            navLinks.forEach(link => {
                link.addEventListener('click', function (e) {
                    const href = this.getAttribute('href');
                    // Don't prevent default for same page links or external links
                    if (href === '#' || href === window.location.pathname || href.startsWith('http')) {
                        return;
                    }

                    e.preventDefault();

                    // Show transition loader
                    if (typeof showTransitionLoader === 'function') {
                        showTransitionLoader();
                    } else {
                        // Fallback: show the initial loader
                        const loader = document.getElementById('loader');
                        if (loader) {
                            loader.style.display = 'flex';
                            loader.style.opacity = '1';
                            loader.style.visibility = 'visible';
                        }
                    }

                    // Navigate after a short delay to let the loader show
                    setTimeout(function () {
                        window.location.href = href;
                    }, 700);
                });
            });

            // 1. Filtering Logic
            const filterBtns = document.querySelectorAll('.premium-filters a');
            const projects = document.querySelectorAll('.project-card');

            filterBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();

                    // Update active button state
                    filterBtns.forEach(b => b.classList.remove('active-filter'));
                    btn.classList.add('active-filter');

                    const filter = btn.getAttribute('data-filter');

                    // First hide everything instantly
                    projects.forEach(p => {
                        p.classList.add('hide');
                        p.style.transition = '';
                        p.style.opacity = '';
                        p.style.transform = '';
                    });

                    // Then reveal matching cards with staggered animation
                    let delay = 0;
                    projects.forEach(p => {
                        if (filter === '*' || p.classList.contains(filter.replace('.', ''))) {
                            setTimeout(() => {
                                p.classList.remove('hide');
                                p.style.opacity = '0';
                                p.style.transform = 'translateY(20px)';
                                p.style.transition = 'none';

                                // Force browser reflow to register the display state change
                                p.offsetHeight;

                                // Apply smooth transition styles
                                p.style.transition = 'opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1), transform 0.4s cubic-bezier(0.4, 0, 0.2, 1)';
                                p.style.opacity = '1';
                                p.style.transform = 'translateY(0)';

                                // Clean up inline styles after animation
                                setTimeout(() => {
                                    p.style.transition = '';
                                    p.style.opacity = '';
                                    p.style.transform = '';
                                }, 450);
                            }, delay);
                            delay += 80;
                        }
                    });
                });
            });

            // 2. Modal Logic
            const modalOverlay = document.getElementById('projectModal');
            const modalClose = document.getElementById('modalClose');
            const modalMedia = document.getElementById('modalMedia');
            const modalCategory = document.getElementById('modalCategory');
            const modalTitle = document.getElementById('modalTitle');
            const modalMeta = document.getElementById('modalMeta');
            const modalDescription = document.getElementById('modalDescription');
            const modalLink = document.getElementById('modalLink');

            projects.forEach(card => {
                card.addEventListener('click', (e) => {
                    e.preventDefault();

                    // Extract Data
                    const title = card.getAttribute('data-title');
                    const category = card.getAttribute('data-category');
                    const desc = card.getAttribute('data-desc');
                    const techStr = card.getAttribute('data-tech');
                    const type = card.getAttribute('data-type');
                    const src = card.getAttribute('data-src');
                    const link = card.getAttribute('href');

                    // Populate Data
                    modalTitle.textContent = title;
                    modalCategory.textContent = category;
                    modalDescription.textContent = desc;
                    modalLink.href = link;

                    // Dynamic Link Text
                    if (link.includes('github.com')) {
                        modalLink.innerHTML = 'View on GitHub <i class="fa-brands fa-github"></i>';
                    } else {
                        modalLink.innerHTML = 'View Project <i class="fa-solid fa-arrow-right"></i>';
                    }

                    // Populate Tech Tags
                    modalMeta.innerHTML = '';
                    if (techStr) {
                        techStr.split(',').forEach(tech => {
                            const span = document.createElement('span');
                            span.textContent = tech.trim();
                            modalMeta.appendChild(span);
                        });
                    }

                    // Populate Media
                    modalMedia.innerHTML = '';
                    if (type === 'video') {
                        const video = document.createElement('video');
                        video.src = src;
                        video.autoplay = true;
                        video.loop = true;
                        video.muted = true;
                        video.playsInline = true;
                        modalMedia.appendChild(video);
                    } else {
                        const img = document.createElement('img');
                        img.src = src;
                        img.alt = title;
                        modalMedia.appendChild(img);
                    }

                    // Show Modal with Animation
                    modalOverlay.classList.add('active');
                    document.body.style.overflow = 'hidden'; // Prevent background scrolling
                });
            });

            // Close Modal Logic
            const closeModal = () => {
                modalOverlay.classList.remove('active');
                document.body.style.overflow = '';
                // Pause video if playing to save resources
                const video = modalMedia.querySelector('video');
                if (video) video.pause();
            };

            modalClose.addEventListener('click', closeModal);
            modalLink.addEventListener('click', closeModal);
            modalOverlay.addEventListener('click', (e) => {
                if (e.target === modalOverlay) closeModal();
            });
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && modalOverlay.classList.contains('active')) closeModal();
            });

            // 3. Drag to Scroll Logic
            const slider = document.getElementById('scrollWrapper');
            let isDown = false;
            let startX;
            let scrollLeft;
            let isDragging = false;

            slider.addEventListener('mousedown', (e) => {
                isDown = true;
                isDragging = false;
                slider.style.cursor = 'grabbing';
                startX = e.pageX - slider.offsetLeft;
                scrollLeft = slider.scrollLeft;
            });

            slider.addEventListener('mouseleave', () => {
                isDown = false;
                slider.style.cursor = 'grab';
            });

            slider.addEventListener('mouseup', () => {
                isDown = false;
                slider.style.cursor = 'grab';
            });

            slider.addEventListener('mousemove', (e) => {
                if (!isDown) return;

                const x = e.pageX - slider.offsetLeft;
                const walk = (x - startX) * 2;

                if (Math.abs(x - startX) > 5) {
                    isDragging = true;
                }

                if (isDragging) {
                    e.preventDefault();
                    slider.scrollLeft = scrollLeft - walk;
                }
            });

            // Prevent card clicks while dragging
            projects.forEach(card => {
                card.addEventListener('click', (e) => {
                    if (isDragging) {
                        e.preventDefault();
                        e.stopImmediatePropagation();
                    }
                }, true);
            });
        });
    </script>
